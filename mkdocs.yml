site_name: Gaea Documentation
site_url: https://gaea-docs.readthedocs.io
theme:
  name: material
  highlightjs: true
  logo: assets/logo.svg
  favicon: assets/logo.svg
  flyout_display: attached
site_favicon: assets/logo.svg
plugins:
  - search
  - mkdocstrings:
      handlers:
        # See: https://mkdocstrings.github.io/python/usage/
        python:
          options:
            docstring_style: sphinx
  - mkdocs-nav-weight
markdown_extensions:
  - admonition 
extra_css:
  - css/custom.css
