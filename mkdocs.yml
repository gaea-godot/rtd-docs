site_name: Gaea Documentation
theme:
  name: readthedocs
  highlightjs: true
site_favicon: assets/images/_other/theme/favicon.ico
plugins:
  - search
  - mkdocstrings:
      handlers:
        # See: https://mkdocstrings.github.io/python/usage/
        python:
          options:
            docstring_style: sphinx
  - mkdocs-nav-weight
markdown_extensions:
  - markdown_include.include:
      base_path: .
  - admonition
